name: Audit and repair Bitrix deal packages

run-name: Audit and repair Bitrix deal packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = тест без записи, false = запись в Bitrix"
        required: true
        default: "true"
      source_responsible_ids:
        description: "ID технических/исходных ответственных через запятую. Алёна = 36,44"
        required: true
        default: "36,44"
      include_closed_deals:
        description: "true = менять закрытые сделки тоже. Обычно false"
        required: true
        default: "false"
      sync_contacts:
        description: "true = также менять ответственных у связанных контактов. Медленнее"
        required: true
        default: "false"
      repair_scope:
        description: "all_actions / split_only"
        required: true
        default: "all_actions"
      limit_per_manager_companies:
        description: "Мягкий лимит компаний для новых пакетов. 0 = не учитывать"
        required: true
        default: "0"
      limit_per_manager_active_deals:
        description: "Мягкий лимит сделок для новых пакетов. Если все выше лимита, выбирается минимальная нагрузка"
        required: true
        default: "30"
      active_deal_load_stage_ids:
        description: "STAGE_ID, которые входят в лимит. По рабочей логике: NEW,EXECUTING = Новая + В работе"
        required: true
        default: "NEW,EXECUTING"
      seed:
        description: "Seed для повторяемого выбора при ничьей. Обычно пусто"
        required: false
        default: ""

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-repair-deal-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate repository config
        run: |
          python scripts/validate_repo.py
          python -m eqazyna_bitrix.audit_repair_deal_packages --help >/dev/null

      - name: Audit and repair package owners
        run: |
          set -euo pipefail
          mkdir -p exports

          DRY_RUN="${{ inputs.dry_run }}"
          SOURCE_RESPONSIBLE_IDS="${{ inputs.source_responsible_ids }}"
          INCLUDE_CLOSED_DEALS="${{ inputs.include_closed_deals }}"
          SYNC_CONTACTS="${{ inputs.sync_contacts }}"
          REPAIR_SCOPE="${{ inputs.repair_scope }}"
          LIMIT_PER_MANAGER_COMPANIES="${{ inputs.limit_per_manager_companies }}"
          LIMIT_PER_MANAGER_ACTIVE_DEALS="${{ inputs.limit_per_manager_active_deals }}"
          ACTIVE_DEAL_LOAD_STAGE_IDS="${{ inputs.active_deal_load_stage_ids }}"
          SEED="${{ inputs.seed }}"

          if [ "$DRY_RUN" != "true" ] && [ -z "${BITRIX_WEBHOOK_URL:-}" ]; then
            echo "ERROR: BITRIX_WEBHOOK_URL secret is empty. Cannot write to Bitrix." >&2
            exit 1
          fi

          echo "DRY_RUN=$DRY_RUN"
          echo "SOURCE_RESPONSIBLE_IDS=$SOURCE_RESPONSIBLE_IDS"
          echo "INCLUDE_CLOSED_DEALS=$INCLUDE_CLOSED_DEALS"
          echo "SYNC_CONTACTS=$SYNC_CONTACTS"
          echo "REPAIR_SCOPE=$REPAIR_SCOPE"
          echo "LIMIT_PER_MANAGER_COMPANIES=$LIMIT_PER_MANAGER_COMPANIES"
          echo "LIMIT_PER_MANAGER_ACTIVE_DEALS=$LIMIT_PER_MANAGER_ACTIVE_DEALS"
          echo "ACTIVE_DEAL_LOAD_STAGE_IDS=$ACTIVE_DEAL_LOAD_STAGE_IDS"
          echo "SEED=$SEED"

          ARGS=(
            python -m eqazyna_bitrix.audit_repair_deal_packages
            --source-responsible-ids "$SOURCE_RESPONSIBLE_IDS"
            --repair-scope "$REPAIR_SCOPE"
            --limit-per-manager-companies "$LIMIT_PER_MANAGER_COMPANIES"
            --limit-per-manager-active-deals "$LIMIT_PER_MANAGER_ACTIVE_DEALS"
            --active-deal-load-stage-ids "$ACTIVE_DEAL_LOAD_STAGE_IDS"
            --out "exports/audit_repair_deal_packages_log.json"
            --csv-out "exports/audit_repair_deal_packages_groups.csv"
          )

          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "$INCLUDE_CLOSED_DEALS" = "true" ]; then ARGS+=(--include-closed-deals); fi
          if [ "$SYNC_CONTACTS" = "true" ]; then ARGS+=(--sync-contacts); fi
          if [ -n "$SEED" ]; then ARGS+=(--seed "$SEED"); fi

          "${ARGS[@]}"
          ls -lah exports

      - name: Upload audit/repair logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-repair-deal-packages-log
          path: |
            exports/*.json
            exports/*.csv
          if-no-files-found: ignore
          retention-days: 14
