name: Reassign founder packages to random managers

run-name: >-
  Founders ${{ inputs.founder_contact_ids }} → auto managers / ${{ inputs.dry_run == 'true' && 'dry-run' || 'write' }}

on:
  workflow_dispatch:
    inputs:
      founder_contact_ids:
        description: "ID контактов учредителей/директоров через запятую, пробел или новую строку"
        required: true
        default: ""
      exclude_manager_ids:
        description: "ID менеджеров, которым нельзя назначать пакеты, через запятую"
        required: false
        default: ""
      dry_run:
        description: "Тест без записи в Bitrix"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      exclude_company_ids:
        description: "ID компаний, которые не переносить, через запятую"
        required: false
        default: ""
      exclude_deal_ids:
        description: "ID сделок, которые не переносить, через запятую"
        required: false
        default: ""
      exclude_contact_ids:
        description: "ID контактов, которые не переносить, через запятую"
        required: false
        default: ""
      deal_originator_id:
        description: "Фильтр сделок ORIGINATOR_ID. Пусто = все сделки найденных компаний"
        required: false
        default: ""
      include_closed_deals:
        description: "Переносить закрытые и проваленные сделки"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      include_deal_contacts:
        description: "Переносить контакты, связанные со сделками найденных компаний"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      verify:
        description: "Проверить ответственных batch-запросом после записи"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      add_timeline_comment:
        description: "Добавить служебный комментарий в каждую карточку учредителя"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"

permissions:
  contents: read
  actions: read

jobs:
  reassign-founder-packages-random:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate repository
        run: |
          python scripts/validate_repo.py
          python -m eqazyna_bitrix.reassign_founder_package_random --help >/dev/null

      - name: Reassign founder packages
        run: |
          set -euo pipefail
          mkdir -p exports

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "MODE: DRY_RUN — Bitrix will not be changed"
          else
            echo "MODE: WRITE — every founder package will be assigned to one selected manager"
          fi

          python -m eqazyna_bitrix.reassign_founder_package_random \
            --founder-contact-ids "${{ inputs.founder_contact_ids }}" \
            --exclude-manager-ids "${{ inputs.exclude_manager_ids }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --exclude-company-ids "${{ inputs.exclude_company_ids }}" \
            --exclude-deal-ids "${{ inputs.exclude_deal_ids }}" \
            --exclude-contact-ids "${{ inputs.exclude_contact_ids }}" \
            --deal-originator-id "${{ inputs.deal_originator_id }}" \
            --include-closed-deals "${{ inputs.include_closed_deals }}" \
            --include-deal-contacts "${{ inputs.include_deal_contacts }}" \
            --verify "${{ inputs.verify }}" \
            --add-timeline-comment "${{ inputs.add_timeline_comment }}" \
            --out "exports/reassign_founder_packages_random_log.csv" \
            --json-out "exports/reassign_founder_packages_random_summary.json"

          echo "---- summary ----"
          cat exports/reassign_founder_packages_random_summary.json

      - name: Upload reassignment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reassign-founder-packages-random-log
          path: |
            exports/reassign_founder_packages_random_log.csv
            exports/reassign_founder_packages_random_summary.json
          if-no-files-found: ignore
          retention-days: 14
