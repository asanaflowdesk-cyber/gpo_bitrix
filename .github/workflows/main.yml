name: e-Qazyna to Bitrix CRM AUTO

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "GitHub runner. Если Ubuntu не видит e-Qazyna, используем macOS"
        required: true
        type: choice
        default: "macos-latest"
        options:
          - "macos-latest"
          - "ubuntu-latest"

      pages:
        description: "Сколько свежих страниц e-Qazyna проверить"
        required: true
        default: "3"

      page_start:
        description: "С какой страницы начать"
        required: true
        default: "1"

      page_list:
        description: "Конкретные страницы, например 16,22,31-35. Обычно пусто."
        required: false
        default: ""

      doc_type:
        description: "Тип документа"
        required: true
        default: "Заявка на разведку ТПИ"

      statuses:
        description: "Статусы через запятую"
        required: true
        default: "Отправлено на рассмотрение,Принято"

      min_created_date:
        description: "Минимальная дата создания, YYYY-MM-DD. Обычно пусто."
        required: false
        default: ""

      push_bitrix:
        description: "true = записывать результат в Bitrix"
        required: true
        default: "true"

      dry_run:
        description: "true = тест без записи, false = запись в Bitrix"
        required: true
        default: "false"

      no_egov:
        description: "true = отключить eGov-обогащение"
        required: true
        default: "false"

      deal_category_id:
        description: "ID воронки сделки"
        required: true
        default: "0"

      deal_stage_id:
        description: "Стадия сделки"
        required: true
        default: "NEW"

      assignment_limit_per_manager:
        description: "Мягкий лимит сделок на менеджера для новых руководителей"
        required: true
        default: "30"

      assignment_load_stage_ids:
        description: "STAGE_ID, которые входят в лимит. По рабочей логике: NEW,EXECUTING = Новая + В работе"
        required: true
        default: "NEW,EXECUTING"

      inherit_failed_deals_by_director:
        description: "true = новая сделка наследует провальную финальную стадию и причину по тому же руководителю"
        required: true
        default: "true"

      failed_deal_stage_ids:
        description: "STAGE_ID провальных стадий через запятую. Обычно LOSE"
        required: true
        default: "LOSE"

      failed_deal_reason_fields:
        description: "Поля причины провала через запятую. Для текущей воронки: UF_CRM_1779448756033"
        required: true
        default: "UF_CRM_1779448756033"

      max_consecutive_page_errors:
        description: "Сколько подряд ошибок страниц допускаем перед остановкой"
        required: true
        default: "1"

concurrency:
  group: eqazyna-to-bitrix
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eqazyna-to-bitrix:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    env:
      EGOV_API_KEY: ${{ secrets.EGOV_API_KEY }}
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}

      BITRIX_ASSIGNED_BY_ID: ${{ vars.BITRIX_ASSIGNED_BY_ID }}
      BITRIX_REQUISITE_PRESET_ID: ${{ vars.BITRIX_REQUISITE_PRESET_ID }}
      BITRIX_REQUISITE_BIN_FIELD: ${{ vars.BITRIX_REQUISITE_BIN_FIELD || 'RQ_BIN' }}

      EQAZYNA_HTTPS_PROXY: ${{ secrets.EQAZYNA_HTTPS_PROXY }}
      EQAZYNA_FETCH_MODE: filtered

      EGOV_ALLOWED_OKED_PREFIXES: ${{ vars.EGOV_ALLOWED_OKED_PREFIXES || '05,07,08,09' }}
      EGOV_MIN_NAME_MATCH: ${{ vars.EGOV_MIN_NAME_MATCH || '75' }}
      EGOV_RESULT_SIZE: ${{ vars.EGOV_RESULT_SIZE || '20' }}

      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}
      EQAZYNA_REQUEST_TIMEOUT: ${{ vars.EQAZYNA_REQUEST_TIMEOUT || '20' }}
      EQAZYNA_POLITE_DELAY_SECONDS: ${{ vars.EQAZYNA_POLITE_DELAY_SECONDS || '1.2' }}
      EQAZYNA_MAX_CONSECUTIVE_PAGE_ERRORS: ${{ vars.EQAZYNA_MAX_CONSECUTIVE_PAGE_ERRORS || '1' }}

      BITRIX_ASSIGNMENT_LIMIT_PER_MANAGER: ${{ vars.BITRIX_ASSIGNMENT_LIMIT_PER_MANAGER || '30' }}
      BITRIX_ASSIGNMENT_LOAD_STAGE_IDS: ${{ vars.BITRIX_ASSIGNMENT_LOAD_STAGE_IDS || 'NEW,EXECUTING' }}
      BITRIX_INHERIT_FAILED_DEALS_BY_DIRECTOR: ${{ vars.BITRIX_INHERIT_FAILED_DEALS_BY_DIRECTOR || 'true' }}
      BITRIX_FAILED_DEAL_STAGE_IDS: ${{ vars.BITRIX_FAILED_DEAL_STAGE_IDS || 'LOSE' }}
      BITRIX_FAILED_DEAL_REASON_FIELDS: ${{ vars.BITRIX_FAILED_DEAL_REASON_FIELDS || 'UF_CRM_1779448756033' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight checks
        run: |
          python scripts/validate_repo.py
          python -m eqazyna_bitrix.main --help >/dev/null

      - name: Run parser, enrichment and Bitrix distribution
        run: |
          set -euo pipefail
          mkdir -p exports

          PAGES="${{ inputs.pages }}"
          PAGE_START="${{ inputs.page_start }}"
          PAGE_LIST="${{ inputs.page_list }}"
          DOC_TYPE="${{ inputs.doc_type }}"
          STATUSES="${{ inputs.statuses }}"
          MIN_CREATED_DATE="${{ inputs.min_created_date }}"
          PUSH_BITRIX="${{ inputs.push_bitrix }}"
          DRY_RUN="${{ inputs.dry_run }}"
          NO_EGOV="${{ inputs.no_egov }}"
          DEAL_CATEGORY_ID="${{ inputs.deal_category_id }}"
          DEAL_STAGE_ID="${{ inputs.deal_stage_id }}"
          ASSIGNMENT_LIMIT_PER_MANAGER="${{ inputs.assignment_limit_per_manager }}"
          ASSIGNMENT_LOAD_STAGE_IDS="${{ inputs.assignment_load_stage_ids }}"
          INHERIT_FAILED_DEALS_BY_DIRECTOR="${{ inputs.inherit_failed_deals_by_director }}"
          FAILED_DEAL_STAGE_IDS="${{ inputs.failed_deal_stage_ids }}"
          FAILED_DEAL_REASON_FIELDS="${{ inputs.failed_deal_reason_fields }}"
          MAX_CONSECUTIVE_PAGE_ERRORS="${{ inputs.max_consecutive_page_errors }}"

          if [ -z "$MAX_CONSECUTIVE_PAGE_ERRORS" ]; then
            MAX_CONSECUTIVE_PAGE_ERRORS="${EQAZYNA_MAX_CONSECUTIVE_PAGE_ERRORS:-1}"
          fi

          if [ "$PUSH_BITRIX" = "true" ] && [ "$DRY_RUN" != "true" ] && [ -z "${BITRIX_WEBHOOK_URL:-}" ]; then
            echo "ERROR: BITRIX_WEBHOOK_URL secret is empty. Cannot write to Bitrix." >&2
            exit 1
          fi

          echo "RUNNER=${{ inputs.runner }}"
          echo "PAGES=$PAGES PAGE_START=$PAGE_START PAGE_LIST=$PAGE_LIST"
          echo "PUSH_BITRIX=$PUSH_BITRIX DRY_RUN=$DRY_RUN NO_EGOV=$NO_EGOV"
          echo "CRM_MODE=deal"
          echo "DEAL_CATEGORY_ID=$DEAL_CATEGORY_ID DEAL_STAGE_ID=$DEAL_STAGE_ID"
          echo "ASSIGNMENT_LIMIT_PER_MANAGER=$ASSIGNMENT_LIMIT_PER_MANAGER"
          echo "ASSIGNMENT_LOAD_STAGE_IDS=$ASSIGNMENT_LOAD_STAGE_IDS"
          echo "INHERIT_FAILED_DEALS_BY_DIRECTOR=$INHERIT_FAILED_DEALS_BY_DIRECTOR"
          echo "FAILED_DEAL_STAGE_IDS=$FAILED_DEAL_STAGE_IDS"
          echo "FAILED_DEAL_REASON_FIELDS=$FAILED_DEAL_REASON_FIELDS"
          echo "EQAZYNA_REQUEST_TIMEOUT=${EQAZYNA_REQUEST_TIMEOUT:-20}"
          echo "MAX_CONSECUTIVE_PAGE_ERRORS=$MAX_CONSECUTIVE_PAGE_ERRORS"

          ARGS=(
            python -m eqazyna_bitrix.main
            --pages "$PAGES"
            --page-start "$PAGE_START"
            --doc-type "$DOC_TYPE"
            --statuses "$STATUSES"
            --crm-mode "deal"
            --deal-category-id "$DEAL_CATEGORY_ID"
            --deal-stage-id "$DEAL_STAGE_ID"
            --assignment-limit-per-manager "$ASSIGNMENT_LIMIT_PER_MANAGER"
            --assignment-load-stage-ids "$ASSIGNMENT_LOAD_STAGE_IDS"
            --inherit-failed-deals-by-director "$INHERIT_FAILED_DEALS_BY_DIRECTOR"
            --failed-deal-stage-ids "$FAILED_DEAL_STAGE_IDS"
            --failed-deal-reason-fields "$FAILED_DEAL_REASON_FIELDS"
            --max-consecutive-page-errors "$MAX_CONSECUTIVE_PAGE_ERRORS"
            --out "exports/eqazyna_bitrix_log.xlsx"
            --json-out "exports/eqazyna_bitrix_log.json"
          )

          if [ -n "$PAGE_LIST" ]; then
            ARGS+=(--page-list "$PAGE_LIST")
          fi

          if [ -n "$MIN_CREATED_DATE" ]; then
            ARGS+=(--min-created-date "$MIN_CREATED_DATE")
          fi

          if [ "$PUSH_BITRIX" = "true" ]; then
            ARGS+=(--push-bitrix)
          fi

          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          if [ "$NO_EGOV" = "true" ]; then
            ARGS+=(--no-egov)
          fi

          "${ARGS[@]}"

          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("exports/eqazyna_bitrix_log.json")

          if p.exists():
              data = json.loads(p.read_text(encoding="utf-8"))
              rows = data if isinstance(data, list) else data.get("results", [])
              errors = [
                  r for r in rows
                  if r.get("error") or str(r.get("action", "")).lower() == "error"
              ]

              print(f"JSON_SUMMARY rows={len(rows)} errors={len(errors)}")

              for row in errors[:10]:
                  print("ERROR_ROW", row)
          PY

          ls -lah exports

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eqazyna-bitrix-run-log
          path: |
            exports/*.xlsx
            exports/*.json
          if-no-files-found: ignore
          retention-days: 14
