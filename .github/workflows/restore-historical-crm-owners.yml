name: Restore historical CRM owners

run-name: >-
  Restore historical owners / ${{ inputs.dry_run == 'true' && 'dry-run' || 'write' }} / category=${{ inputs.deal_category_id }}

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Сначала true для проверки CSV, потом false для реального возврата"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"

      repair:
        description: "true = применять исправления, false = только аудит"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

      deal_category_id:
        description: "ID воронки. Для основной воронки обычно 0. all = все воронки"
        required: true
        default: "0"

      source_responsible_ids:
        description: "Технические пользователи, которые не считаются историческими менеджерами"
        required: true
        default: "36,44"

      max_deals:
        description: "Лимит сделок для проверки. 0 = без лимита"
        required: true
        default: "0"

      include_closed_deals:
        description: "Включать закрытые сделки"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: read
  actions: read

jobs:
  restore-historical-crm-owners:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '30' }}
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate repository
        run: |
          python scripts/validate_repo.py
          python -m eqazyna_bitrix.audit_repair_director_package_owners --help >/dev/null

      - name: Restore historical package owners
        run: |
          set -euo pipefail
          mkdir -p exports

          DRY_RUN="${{ inputs.dry_run }}"
          REPAIR="${{ inputs.repair }}"
          DEAL_CATEGORY_ID="${{ inputs.deal_category_id }}"
          SOURCE_RESPONSIBLE_IDS="${{ inputs.source_responsible_ids }}"
          MAX_DEALS="${{ inputs.max_deals }}"
          INCLUDE_CLOSED_DEALS="${{ inputs.include_closed_deals }}"

          if [ -z "${BITRIX_WEBHOOK_URL:-}" ]; then
            echo "ERROR: BITRIX_WEBHOOK_URL secret is empty" >&2
            exit 1
          fi

          if [ "$DRY_RUN" != "true" ] && [ "$DRY_RUN" != "false" ]; then
            echo "ERROR: dry_run must be true or false" >&2
            exit 1
          fi

          if [ "$REPAIR" != "true" ] && [ "$REPAIR" != "false" ]; then
            echo "ERROR: repair must be true or false" >&2
            exit 1
          fi

          if [ "$INCLUDE_CLOSED_DEALS" != "true" ] && [ "$INCLUDE_CLOSED_DEALS" != "false" ]; then
            echo "ERROR: include_closed_deals must be true or false" >&2
            exit 1
          fi

          echo "DRY_RUN=$DRY_RUN"
          echo "REPAIR=$REPAIR"
          echo "DEAL_CATEGORY_ID=$DEAL_CATEGORY_ID"
          echo "SOURCE_RESPONSIBLE_IDS=$SOURCE_RESPONSIBLE_IDS"
          echo "MAX_DEALS=$MAX_DEALS"
          echo "INCLUDE_CLOSED_DEALS=$INCLUDE_CLOSED_DEALS"
          echo "REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}"

          ARGS=(
            python -u -m eqazyna_bitrix.audit_repair_director_package_owners
            --only-eqazyna
            --deal-category-id "$DEAL_CATEGORY_ID"
            --source-responsible-ids "$SOURCE_RESPONSIBLE_IDS"
            --max-deals "$MAX_DEALS"
            --summary-out "exports/historical_owner_summary.csv"
            --mismatch-out "exports/historical_owner_mismatches.csv"
            --unresolved-out "exports/historical_owner_unresolved_deals.csv"
            --out "exports/historical_owner_actions.csv"
          )

          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          if [ "$REPAIR" = "true" ]; then
            ARGS+=(--repair)
          fi

          if [ "$INCLUDE_CLOSED_DEALS" = "true" ]; then
            ARGS+=(--include-closed-deals)
          fi

          "${ARGS[@]}"

          echo "== exports =="
          ls -lah exports

      - name: Upload historical owner logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-historical-crm-owners-log
          path: exports/*.csv
          if-no-files-found: ignore
          retention-days: 14
