name: Audit company/deal owner mismatches

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Что проверять: all_companies или только source_companies"
        required: true
        default: "all_companies"
      source_responsible_ids:
        description: "Технические ответственные через запятую. Алёна = 36,44"
        required: true
        default: "36,44"
      deal_category_id:
        description: "ID воронки сделок или all"
        required: true
        default: "all"
      include_closed_deals:
        description: "Включать закрытые сделки"
        type: boolean
        required: true
        default: true
      include_non_eqazyna_deals:
        description: "Включать не только e-Qazyna сделки"
        type: boolean
        required: true
        default: true
      max_companies:
        description: "Лимит компаний для теста. 0 = без лимита"
        required: true
        default: "0"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-owner-mismatches:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Audit company/deal owner mismatches
        run: |
          mkdir -p exports

          ARGS=(
            python -m eqazyna_bitrix.audit_company_deal_owner_mismatches
            --scope "${{ inputs.scope }}"
            --source-responsible-ids "${{ inputs.source_responsible_ids }}"
            --deal-category-id "${{ inputs.deal_category_id }}"
            --max-companies "${{ inputs.max_companies }}"
          )

          if [ "${{ inputs.include_closed_deals }}" = "true" ]; then
            ARGS+=(--include-closed-deals)
          fi

          if [ "${{ inputs.include_non_eqazyna_deals }}" = "true" ]; then
            ARGS+=(--include-non-eqazyna-deals)
          fi

          "${ARGS[@]}"
          ls -lah exports

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: company-deal-owner-mismatch-audit
          path: |
            exports/*.json
            exports/*.csv
          if-no-files-found: ignore
          retention-days: 14
