name: Audit/repair director package owners

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Тест без записи в Bitrix"
        required: true
        default: "true"
      repair:
        description: "Исправлять найденные расхождения. Включать только после проверки отчёта"
        required: true
        default: "false"
      only_eqazyna:
        description: "Проверять только сделки e-Qazyna"
        required: true
        default: "true"
      deal_category_id:
        description: "ID воронки или all"
        required: true
        default: "all"
      include_closed_deals:
        description: "Включать закрытые сделки"
        required: true
        default: "true"
      target_policy:
        description: "Как выбирать единого менеджера: rules_then_majority / director_owner / unanimous_deal_owner / majority"
        required: true
        default: "rules_then_majority"
      source_responsible_ids:
        description: "Технические ответственные через запятую"
        required: true
        default: "36,44"
      max_deals:
        description: "0 = без лимита"
        required: true
        default: "0"

permissions:
  contents: read

jobs:
  audit-repair-director-package-owners:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Audit/repair director package owners
        run: |
          mkdir -p exports

          ARGS=(
            python -m eqazyna_bitrix.audit_repair_director_package_owners
            --source-responsible-ids "${{ inputs.source_responsible_ids }}"
            --deal-category-id "${{ inputs.deal_category_id }}"
            --target-policy "${{ inputs.target_policy }}"
            --max-deals "${{ inputs.max_deals }}"
            --summary-out "exports/director_package_owner_summary.csv"
            --mismatch-out "exports/director_package_owner_mismatches.csv"
            --out "exports/director_package_owner_actions.csv"
          )

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          if [ "${{ inputs.repair }}" = "true" ]; then
            ARGS+=(--repair)
          fi

          if [ "${{ inputs.only_eqazyna }}" = "true" ]; then
            ARGS+=(--only-eqazyna)
          fi

          if [ "${{ inputs.include_closed_deals }}" = "true" ]; then
            ARGS+=(--include-closed-deals)
          fi

          "${ARGS[@]}"
          ls -lah exports

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: director-package-owner-audit
          path: exports/*.csv
          if-no-files-found: ignore
          retention-days: 14
