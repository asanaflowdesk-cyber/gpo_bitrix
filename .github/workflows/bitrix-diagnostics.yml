name: Bitrix diagnostics

on:
  workflow_dispatch:

concurrency:
  group: bitrix-diagnostics
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bitrix diagnostics
        run: |
          mkdir -p exports/diagnostics
          python -m eqazyna_bitrix.diagnostics

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bitrix-diagnostics
          path: exports/diagnostics/*
          if-no-files-found: ignore
          retention-days: 14
