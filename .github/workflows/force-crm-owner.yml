name: Force CRM owner by ID

run-name: >-
  Force CRM owner / ${{ inputs.entity_type }} #${{ inputs.entity_id }} → user ${{ inputs.target_user_id }} / ${{ inputs.dry_run == 'true' && 'dry-run' || 'write' }}

on:
  workflow_dispatch:
    inputs:
      entity_type:
        description: "Тип CRM-сущности"
        required: true
        type: choice
        options:
          - deal
          - company
          - contact
        default: deal
      entity_id:
        description: "ID сделки/компании/контакта"
        required: true
        default: ""
      target_user_id:
        description: "ID нового ответственного пользователя Bitrix"
        required: true
        default: ""
      dry_run:
        description: "Тест без записи в Bitrix"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      verify_delay_seconds:
        description: "Через сколько секунд повторно проверить владельца"
        required: true
        default: "5"

permissions:
  contents: read
  actions: read

jobs:
  force-crm-owner:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Force CRM owner
        run: |
          mkdir -p exports
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "MODE: DRY_RUN — Bitrix will not be changed"
          else
            echo "MODE: WRITE — Bitrix update methods will be called"
          fi

          python -m eqazyna_bitrix.force_crm_owner \
            --entity-type "${{ inputs.entity_type }}" \
            --entity-id "${{ inputs.entity_id }}" \
            --target-user-id "${{ inputs.target_user_id }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --verify-delay-seconds "${{ inputs.verify_delay_seconds }}" \
            --out "exports/force_crm_owner_log.csv" \
            --json-out "exports/force_crm_owner_summary.json"

          ls -lah exports
          echo "---- summary ----"
          cat exports/force_crm_owner_summary.json || true

      - name: Upload force owner log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: force-crm-owner-log
          path: |
            exports/force_crm_owner_log.csv
            exports/force_crm_owner_summary.json
          if-no-files-found: ignore
          retention-days: 14
