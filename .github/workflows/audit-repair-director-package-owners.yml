name: Full audit/repair all existing deals by director

run-name: >-
  Full director package check / ${{ inputs.dry_run == 'true' && 'dry-run' || 'write' }}

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = только отчет, false = разрешить запись"
        required: true
        default: "true"
      repair:
        description: "true = выровнять директора, компании и сделки на одного менеджера"
        required: true
        default: "false"
      include_closed_deals:
        description: "true = проверить закрытые сделки тоже"
        required: true
        default: "true"
      only_eqazyna:
        description: "false = проверить вообще все сделки Bitrix, не только e-Qazyna"
        required: true
        default: "false"
      deal_category_id:
        description: "all = все воронки"
        required: true
        default: "all"
      source_responsible_ids:
        description: "Технические ответственные, которые не считаются целевыми менеджерами"
        required: true
        default: "36,44"
      target_policy:
        description: "rules_then_majority / director"
        required: true
        default: "rules_then_majority"
      max_deals:
        description: "0 = без лимита, проверить все существующие сделки"
        required: true
        default: "0"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-director-package-check:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate module
        run: |
          python scripts/validate_repo.py
          python -m eqazyna_bitrix.audit_repair_director_package_owners --help >/dev/null

      - name: Check all existing deals
        run: |
          set -euo pipefail
          mkdir -p exports

          ARGS=(
            python -m eqazyna_bitrix.audit_repair_director_package_owners
            --source-responsible-ids "${{ inputs.source_responsible_ids }}"
            --deal-category-id "${{ inputs.deal_category_id }}"
            --target-policy "${{ inputs.target_policy }}"
            --max-deals "${{ inputs.max_deals }}"
            --summary-out "exports/director_package_owner_summary.csv"
            --mismatch-out "exports/director_package_owner_mismatches.csv"
            --unresolved-out "exports/director_package_owner_unresolved_deals.csv"
            --out "exports/director_package_owner_actions.csv"
          )

          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "${{ inputs.repair }}" = "true" ]; then ARGS+=(--repair); fi
          if [ "${{ inputs.include_closed_deals }}" = "true" ]; then ARGS+=(--include-closed-deals); fi
          if [ "${{ inputs.only_eqazyna }}" = "true" ]; then ARGS+=(--only-eqazyna); fi

          "${ARGS[@]}"
          ls -lah exports

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-director-package-owner-audit
          path: exports/*.csv
          if-no-files-found: ignore
          retention-days: 14
