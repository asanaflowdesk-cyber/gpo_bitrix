name: Reassign CRM owner

run-name: >-
  Reassign CRM owner / ${{ inputs.source_user_id }} → ${{ inputs.target_user_id }} / ${{ inputs.dry_run == 'true' && 'dry-run' || 'write' }}

on:
  workflow_dispatch:
    inputs:
      source_user_id:
        description: "ID менеджера, у которого забираем весь связанный пакет"
        required: true
        default: ""
      target_user_id:
        description: "ID пользователя Bitrix, которому передаём весь пакет"
        required: true
        default: ""
      dry_run:
        description: "Режим: сначала true, после проверки false"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      max_entities:
        description: "Стоп-лимит на компании + контакты + сделки. Защита от случайного захвата всей CRM"
        required: true
        default: "5000"

permissions:
  contents: read
  actions: read

jobs:
  reassign-crm-owner:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      BITRIX_PORTAL_URL: ${{ vars.BITRIX_PORTAL_URL || 'https://b24-izmquv.bitrix24.kz' }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '60' }}
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Reassign complete CRM package
        run: |
          mkdir -p exports
          python -u -m eqazyna_bitrix.reassign_crm_owner \
            --source-user-id "${{ inputs.source_user_id }}" \
            --target-user-id "${{ inputs.target_user_id }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --max-entities "${{ inputs.max_entities }}" \
            --out "exports/reassign_crm_owner_log.csv"
          ls -lah exports

      - name: Upload reassignment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reassign-crm-owner-log
          path: exports/*.csv
          if-no-files-found: ignore
          retention-days: 14
